name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest
      - name: Run CLI smoke test
        run: |
          agentguard check --agent examples/agent.yaml --call examples/tool_call.json --receipts /tmp/receipts.jsonl --cost 0.012
          agentguard report --agent examples/agent.yaml --receipts /tmp/receipts.jsonl
